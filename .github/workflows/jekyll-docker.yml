// QA issues
const qaData = [
 {id:"QA001",code:"P-68002",type:"Mixed language",sev:"Low",desc:"สถานะใช้ภาษาอังกฤษและไทยปนกัน (complete/ครบ/เรียบร้อย)"},
 {id:"QA002",code:"P-68003",type:"Missing status",sev:"High",desc:"สถานะโครงการว่าง — ไม่ทราบว่า active หรือไม่"},
 {id:"QA003",code:"P-68006",type:"Date format",sev:"Medium",desc:"วันที่เป็น Excel serial number (244464) — ปน พ.ศ./ค.ศ."},
 {id:"QA004",code:"R003 (P-68016)",type:"Out-of-range value",sev:"High",desc:"knowledge_post = 6 เกิน scale 1-5"},
 {id:"QA005",code:"R008 (P-68010)",type:"Age outlier",sev:"High",desc:"อายุ = 150 ผิดปกติ — น่าจะเป็น 15 หรือ 50"},
 {id:"QA006",code:"R009-R010",type:"Possible duplicate",sev:"Medium",desc:"R009 และ R010 มีข้อมูลเหมือนกันทุกคอลัมน์"},
 {id:"QA007",code:"R021",type:"project_code format",sev:"Low",desc:"P68013 ขาด dash — ควรเป็น P-68013"},
 {id:"QA008",code:"R005",type:"Date format",sev:"Medium",desc:"วันที่ 18/4/69 (พ.ศ.) ไม่ตรงกับ format อื่น"},
 {id:"QA009",code:"R026",type:"Missing project_code",sev:"High",desc:"ไม่มีรหัสโครงการ — ไม่สามารถ join ได้"},
 {id:"QA010",code:"R016",type:"Missing demographics",sev:"Low",desc:"อายุและเพศว่าง — บริบทกลุ่มเปราะบาง"},
 {id:"QA011",code:"P-68004",type:"Vague claim",sev:"Medium",desc:"Q004 ไม่มีตัวเลข ชื่อกลุ่ม หรือ timeframe"},
 {id:"QA012",code:"P-68012",type:"High claim, no evidence",sev:"High",desc:"อ้างว่า 'โรงเรียนมีพื้นที่ปลอดภัยมากขึ้น' แต่ไม่มีไฟล์แนบ"}
];

// ── HELPERS ─────────────────────────────────────────────────────
function score(p){return Math.round(((p.tracker+p.quant+p.qual)/3)*100);}
function statusLabel(s){return s>=90?"Complete":s>=50?"Partial":"Missing";}
function pillClass(s){return s==="Complete"?"pill-complete":s==="Partial"?"pill-partial":"pill-missing";}
function segBar(val, color){
  return `<div class="seg-bar"><div class="seg-fill" style="width:${Math.round(val*100)}%;background:${color}"></div></div>`;
}
function fmtBudget(b){return "฿"+b.toLocaleString();}

// ── RENDER TABLE ────────────────────────────────────────────────
function render(){
  const search = document.getElementById("search").value.toLowerCase();
  const fStatus = document.getElementById("flt-status").value;
  const fNode   = document.getElementById("flt-node").value;
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  let shown = 0;
  projects.forEach(p => {
    const s = score(p), sl = statusLabel(s);
    if(fStatus && sl !== fStatus) return;
    if(fNode && p.node !== fNode) return;
    if(search && !p.code.toLowerCase().includes(search) && !p.name.toLowerCase().includes(search)) return;
    shown++;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="color:#1F3864;font-weight:700;font-size:12px">${p.code}</td>
      <td>${p.name}</td>
      <td><span style="font-size:12px;color:#555">${p.node}</span></td>
      <td style="font-size:12px;color:#555">${p.province}</td>
      <td><span class="pill ${pillClass(sl)}">${sl}</span></td>
      <td>
        <div class="seg-wrap">
          ${segBar(p.tracker,"#639922")}
          ${segBar(p.quant,"#2E75B6")}
          ${segBar(p.qual,"#c0392b")}
          <span class="seg-pct">${s}%</span>
        </div>
      </td>
      <td style="font-size:12px;color:#555">${fmtBudget(p.budget)}</td>
      <td style="font-size:12px;color:#555">${p.mentor}</td>`;
    tr.onclick = () => openModal(p.code);
    tbody.appendChild(tr);
  });
  document.getElementById("no-results").style.display = shown ? "none" : "block";
  // update KPIs on unfiltered set
  const total = projects.length;
  const complete = projects.filter(p=>statusLabel(score(p))==="Complete").length;
  const partial  = projects.filter(p=>statusLabel(score(p))==="Partial").length;
  const missing  = projects.filter(p=>statusLabel(score(p))==="Missing").length;
  document.getElementById("k-complete").textContent = complete;
  document.getElementById("k-partial").textContent  = partial;
  document.getElementById("k-missing").textContent  = missing;
}

// ── MODAL ────────────────────────────────────────────────────────
function openModal(code){
  const p = projects.find(x=>x.code===code);
  if(!p) return;
  const s = score(p), sl = statusLabel(s);
  document.getElementById("m-code").textContent = p.code + " — " + p.node + " | " + p.province;
  document.getElementById("m-name").textContent = p.name;

  // Overview tab
  document.getElementById("tab-overview").innerHTML = `
    <div class="info-grid">
      <div class="info-row"><div class="info-label">Status</div><div class="info-val"><span class="pill ${pillClass(sl)}">${sl} — ${s}%</span></div></div>
      <div class="info-row"><div class="info-label">Project status</div><div class="info-val">${p.status_proj||"—"}</div></div>
      <div class="info-row"><div class="info-label">Issue area</div><div class="info-val">${p.issue}</div></div>
      <div class="info-row"><div class="info-label">Budget</div><div class="info-val">${fmtBudget(p.budget)} THB</div></div>
      <div class="info-row"><div class="info-label">Mentor</div><div class="info-val">${p.mentor}</div></div>
      <div class="info-row"><div class="info-label">Data channel</div><div class="info-val">${p.channel||"—"}</div></div>
      <div class="info-row"><div class="info-label">Last data received</div><div class="info-val">${p.last_date||"—"}</div></div>
      <div class="info-row"><div class="info-label">Tracker</div><div class="info-val">${Math.round(p.tracker*100)}%</div></div>
      <div class="info-row"><div class="info-label">Quantitative</div><div class="info-val">${Math.round(p.quant*100)}%</div></div>
      <div class="info-row"><div class="info-label">Qualitative</div><div class="info-val">${Math.round(p.qual*100)}%</div></div>
    </div>
    <div style="margin-top:16px;padding:12px 14px;background:#f0f4f8;border-radius:8px">
      <div style="font-size:12px;color:#888;margin-bottom:4px">Raw outcome from field</div>
      <div style="font-size:14px">${p.outcome||"(ยังไม่มีข้อมูล)"}</div>
    </div>
    <div style="margin-top:10px;padding:12px 14px;background:#fff8e1;border-left:4px solid #f59e0b;border-radius:6px">
      <div style="font-size:12px;font-weight:700;color:#856404;margin-bottom:4px">Data quality note</div>
      <div style="font-size:13px">${p.quality_note||"—"}</div>
    </div>
    <div style="margin-top:10px;padding:12px 14px;background:#fef2f2;border-left:4px solid #ef4444;border-radius:6px">
      <div style="font-size:12px;font-weight:700;color:#991b1b;margin-bottom:4px">Action needed</div>
      <div style="font-size:13px">${p.action||"—"}</div>
    </div>`;

  // Quant tab
  const qrows = quantData.filter(r=>r.code===code||r.code===code.replace("-",""));
  if(qrows.length){
    document.getElementById("tab-quant").innerHTML = `
      <div style="overflow-x:auto"><table class="quant-table">
        <thead><tr><th>ID</th><th>Role</th><th>Round</th><th>Date</th><th>Age</th><th>Gender</th><th>Know pre</th><th>Know post</th><th>Behaviour</th><th>Follow-up</th><th>Note</th></tr></thead>
        <tbody>${qrows.map(r=>`<tr>
          <td>${r.id}${r.flag?`<span class="badge-warn" title="${r.flag}">⚠</span>`:""}</td>
          <td>${r.role}</td><td>${r.round}</td><td>${r.date}</td>
          <td>${r.age}</td><td>${r.gender}</td>
          <td style="text-align:center">${r.know_pre}</td>
          <td style="text-align:center;${r.know_post>5?"color:#c0392b;font-weight:700":""}">${r.know_post}</td>
          <td style="text-align:center">${r.behaviour}</td>
          <td>${r.followup}</td><td style="font-size:12px;color:#555">${r.note}</td>
        </tr>`).join("")}</tbody>
      </table></div>
      <p style="font-size:12px;color:#888;margin-top:8px">⚠ = data quality flag — see QA tab for details</p>`;
  } else {
    document.getElementById("tab-quant").innerHTML = `<p style="color:#888;padding:20px 0">ไม่มีข้อมูลเชิงปริมาณสำหรับโครงการนี้</p>`;
  }

  // Qual tab
  const qualRows = qualData.filter(r=>r.code===code);
  if(qualRows.length){
    document.getElementById("tab-qual").innerHTML = qualRows.map(r=>`
      <div style="padding:14px 0;border-bottom:1px solid #eee">
        <div style="display:flex;gap:12px;align-items:baseline;flex-wrap:wrap;margin-bottom:6px">
          <span style="font-weight:700;font-size:13px">${r.id}</span>
          <span style="font-size:12px;color:#666">${r.source}</span>
          <span style="font-size:12px;color:#666">${r.role}</span>
          <span style="font-size:12px;color:#666">${r.date}</span>
          <span style="font-size:11px;background:#e8f4fd;color:#1a5a8a;padding:1px 7px;border-radius:4px">${r.claim}</span>
          <span style="font-size:11px;color:#888">Quote: ${r.has_quote}</span>
        </div>
        <p style="font-size:13px;line-height:1.7;margin-bottom:8px">${r.summary}</p>
        <div style="font-size:12px;color:#666">📎 ${r.attachment} &nbsp;|&nbsp; ⚠ ${r.issue}</div>
      </div>`).join("");
  } else {
    document.getElementById("tab-qual").innerHTML = `<p style="color:#888;padding:20px 0">ไม่มีบันทึกเชิงคุณภาพสำหรับโครงการนี้</p>`;
  }

  // QA tab
  const qaRows = qaData.filter(r=>r.code.startsWith(code)||r.code===code);
  if(qaRows.length){
    document.getElementById("tab-qa").innerHTML = qaRows.map(r=>`
      <div class="qa-box ${r.sev==='High'?'high':''}">
        <div class="qa-box-title">${r.id} — ${r.type} <span style="font-size:11px;padding:1px 7px;border-radius:4px;background:${r.sev==='High'?'#fee2e2':r.sev==='Medium'?'#fff3cd':'#f0fdf4'};color:${r.sev==='High'?'#991b1b':r.sev==='Medium'?'#92400e':'#166534'}">${r.sev}</span></div>
        <p>${r.desc}</p>
      </div>`).join("");
  } else {
    document.getElementById("tab-qa").innerHTML = `<p style="color:#888;padding:20px 0">ไม่มี QA issues ที่บันทึกไว้สำหรับโครงการนี้</p>`;
  }

  // Reset to first tab
  document.querySelectorAll(".tab-btn").forEach((b,i)=>b.classList.toggle("active",i===0));
  document.querySelectorAll(".tab-panel").forEach((p,i)=>p.classList.toggle("active",i===0));
  document.getElementById("modal-bg").classList.add("open");
}

function closeModal(e){if(e.target===document.getElementById("modal-bg"))document.getElementById("modal-bg").classList.remove("open");}

function switchTab(id, btn){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById(id).classList.add("active");
}

// ── INIT ─────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", render);
document.getElementById("flt-status").addEventListener("change", render);
document.getElementById("flt-node").addEventListener("change", render);
document.getElementById("hdr-date").textContent = "As of " + new Date().toLocaleDateString("th-TH",{year:"numeric",month:"long",day:"numeric"});
render();
</script>
</body>
</html>
