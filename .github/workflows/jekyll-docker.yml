<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic Plan Completeness Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f4f6f9;color:#222;font-size:14px}
  header{background:#1F3864;color:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:center}
  header h1{font-size:20px;font-weight:600}
  header span{font-size:12px;opacity:.75}
  .container{max-width:1280px;margin:0 auto;padding:20px 24px}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{background:#fff;border-radius:10px;padding:16px 20px;border:1px solid #dde3ed}
  .kpi-label{font-size:12px;color:#666;margin-bottom:6px}
  .kpi-val{font-size:28px;font-weight:700}
  .kpi-val.green{color:#1a7a3f}.kpi-val.amber{color:#a86400}.kpi-val.red{color:#c0392b}.kpi-val.blue{color:#1F3864}
  .controls{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .controls select,.controls input{padding:7px 11px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff}
  .controls input{flex:1;min-width:160px}
  .legend{display:flex;gap:16px;margin-left:auto;font-size:12px;color:#555;flex-wrap:wrap}
  .leg-dot{display:inline-block;width:11px;height:11px;border-radius:2px;margin-right:5px;vertical-align:middle}
  table{width:100%;background:#fff;border-radius:10px;border-collapse:collapse;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
  thead tr{background:#1F3864;color:#fff}
  th{padding:11px 13px;text-align:left;font-size:12px;font-weight:600;white-space:nowrap}
  td{padding:10px 13px;border-bottom:1px solid #eef0f5;vertical-align:middle;font-size:13px}
  tr:last-child td{border-bottom:none}
  tr:nth-child(even) td{background:#f8fafd}
  tr:hover td{background:#eef4ff;cursor:pointer}
  .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
  .pill-complete{background:#d4edda;color:#155724}
  .pill-partial{background:#fff3cd;color:#856404}
  .pill-missing{background:#f8d7da;color:#721c24}
  .seg-wrap{display:flex;gap:5px;align-items:center}
  .seg-bar{flex:1;height:7px;border-radius:4px;background:#e0e0e0;overflow:hidden}
  .seg-fill{height:100%;border-radius:4px}
  .seg-pct{font-size:12px;color:#555;min-width:33px;text-align:right}
  /* modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:12px;width:100%;max-width:860px;padding:28px 32px;position:relative}
  .modal-close{position:absolute;top:16px;right:18px;font-size:22px;cursor:pointer;color:#666;background:none;border:none}
  .modal-code{font-size:13px;color:#1F3864;font-weight:700;margin-bottom:4px}
  .modal-name{font-size:18px;font-weight:700;margin-bottom:18px;line-height:1.4}
  .modal-tabs{display:flex;gap:0;border-bottom:2px solid #e0e0e0;margin-bottom:20px}
  .tab-btn{padding:8px 20px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px}
  .tab-btn.active{color:#1F3864;border-bottom-color:#1F3864}
  .tab-panel{display:none}.tab-panel.active{display:block}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px}
  .info-row{display:flex;flex-direction:column;padding:8px 0;border-bottom:1px solid #f0f0f0}
  .info-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
  .info-val{font-size:13px;color:#222}
  .quant-table,.qual-table{width:100%;border-collapse:collapse;font-size:13px}
  .quant-table th,.qual-table th{background:#2E75B6;color:#fff;padding:8px 10px;text-align:left;font-weight:600;font-size:12px}
  .quant-table td,.qual-table td{padding:8px 10px;border-bottom:1px solid #eee}
  .quant-table tr:nth-child(even) td,.qual-table tr:nth-child(even) td{background:#f8fafd}
  .badge-warn{display:inline-block;background:#fff3cd;color:#856404;border-radius:4px;padding:1px 7px;font-size:11px;margin-left:6px}
  .qa-box{background:#fff8e1;border-left:4px solid #f59e0b;padding:12px 16px;border-radius:6px;margin-bottom:10px}
  .qa-box.high{background:#fef2f2;border-left-color:#ef4444}
  .qa-box-title{font-weight:700;font-size:12px;margin-bottom:4px}
  .qa-box p{font-size:13px;color:#444}
  @media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}.info-grid{grid-template-columns:1fr}.modal{padding:18px 14px}}
</style>
</head>
<body>
<header>
  <h1>Strategic Plan — Completeness Dashboard</h1>
  <span id="hdr-date"></span>
</header>
<div class="container">
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Total projects</div><div class="kpi-val blue" id="k-total">24</div></div>
    <div class="kpi"><div class="kpi-label">Complete (&ge;90%)</div><div class="kpi-val green" id="k-complete">—</div></div>
    <div class="kpi"><div class="kpi-label">Partial (50–89%)</div><div class="kpi-val amber" id="k-partial">—</div></div>
    <div class="kpi"><div class="kpi-label">Missing (&lt;50%)</div><div class="kpi-val red" id="k-missing">—</div></div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search project name or code…">
    <select id="flt-status">
      <option value="">All statuses</option>
      <option>Complete</option><option>Partial</option><option>Missing</option>
    </select>
    <select id="flt-node">
      <option value="">All node types</option>
      <option>NT1-AREA</option><option>NT2-ISSUE</option><option>NT3-POP</option>
      <option>WP01-GRANT</option><option>WP02-PARTNERSHIP</option>
    </select>
    <div class="legend">
      <span><span class="leg-dot" style="background:#639922"></span>Tracker</span>
      <span><span class="leg-dot" style="background:#2E75B6"></span>Quantitative</span>
      <span><span class="leg-dot" style="background:#c0392b"></span>Qualitative</span>
    </div>
  </div>

  <table id="main-table">
    <thead>
      <tr>
        <th style="width:90px">Code</th>
        <th>Project name</th>
        <th style="width:130px">Node type</th>
        <th style="width:90px">Province</th>
        <th style="width:80px">Status</th>
        <th style="width:220px">Completeness (T / Q / Q)</th>
        <th style="width:80px">Budget</th>
        <th style="width:70px">Mentor</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <p id="no-results" style="display:none;text-align:center;padding:30px;color:#888">No projects match the current filter.</p>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal-bg').classList.remove('open')">&times;</button>
    <div class="modal-code" id="m-code"></div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-tabs">
      <button class="tab-btn active" onclick="switchTab('tab-overview',this)">Overview</button>
      <button class="tab-btn" onclick="switchTab('tab-quant',this)">Quantitative data</button>
      <button class="tab-btn" onclick="switchTab('tab-qual',this)">Qualitative data</button>
      <button class="tab-btn" onclick="switchTab('tab-qa',this)">QA issues</button>
    </div>
    <div id="tab-overview" class="tab-panel active"></div>
    <div id="tab-quant"    class="tab-panel"></div>
    <div id="tab-qual"     class="tab-panel"></div>
    <div id="tab-qa"       class="tab-panel"></div>
  </div>
</div>

